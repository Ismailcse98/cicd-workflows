name: Dependent workflow job

on:
  workflow_dispatch:

jobs:
  first-workflow-job:
    runs-on: ubuntu-latest
    steps:
      - name: First step
        run: |
          echo "Hello, First workflow"

  second-workflow-job:
    runs-on: ubuntu-latest
    needs: [first-workflow-job]
    steps:
      - name: Second step
        run: |
          echo "Hello, Second workflow"

  Third-workflow-job:
    runs-on: ubuntu-latest
    needs: [first-workflow-job, second-workflow-job]
    steps:
      - name: Third step
        run: |
          echo "Hello, Third workflow"
