name: Value Pass workflow

on:
  workflow_dispatch:
    inputs:
      name:
        discription: 'Enter your name'
        required: true
        default: 'Unnamed'

jobs:
  get-value-workflow-job:
    runs-on: ubuntu-latest
    outputs:
      greetings-message: ${{ steps.generate_message.outputs.message }}

    steps:
      - name: Generate Greetings Message
        id: generate_message
        run: |
          echo "message=Hello, ${{ github.event.inputs.name }}|" >> $GITHUB_OUTPUT

  print-value-workflow-job:
    runs-on: ubuntu-latest
    needs: [get-value-workflow-job]

    steps:
      - name: Print Greetings Message
        run: |
          echo "${{ needs.get-value-workflow-job.outputs.greetings-message }}"
